<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Budget Familial - Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase SDK (version compatible) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f5f7fb;
  color: #1e293b;
  font-size: 14px;
  overflow-x: hidden;
}

/* ===== MENU HAMBURGER ===== */
.mobile-header {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #1d3557;
  color: white;
  padding: 12px 16px;
  z-index: 1000;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.mobile-header h1 { font-size: 1.2rem; }
.hamburger {
  font-size: 1.8rem;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  padding: 0 8px;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1001;
}
.sidebar-mobile {
  position: fixed;
  top: 0;
  left: -280px;
  width: 280px;
  bottom: 0;
  background: #1d3557;
  color: white;
  transition: left 0.3s ease;
  z-index: 1002;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar-mobile.open { left: 0; }
.sidebar-mobile .close-btn {
  text-align: right;
  padding: 16px;
  background: none;
  border: none;
  color: white;
  font-size: 1.5rem;
  cursor: pointer;
}
.sidebar-mobile .sidebar-brand { padding: 0 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-mobile .nav-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-left: 3px solid transparent; }
.sidebar-mobile .nav-item.active { background: rgba(255,255,255,0.15); border-left-color: #52b788; }
.sidebar-mobile .nav-badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }

/* ===== DESKTOP SIDEBAR ===== */
.desktop-sidebar {
  width: 260px;
  background: #1d3557;
  color: white;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.desktop-sidebar .sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.desktop-sidebar .month-nav { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; gap: 8px; }
.desktop-sidebar .month-nav select { background: rgba(255,255,255,0.12); color: white; border: none; padding: 8px; border-radius: 6px; }
.desktop-sidebar .nav-item { padding: 10px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-left: 3px solid transparent; }
.desktop-sidebar .nav-item.active { background: rgba(255,255,255,0.1); border-left-color: #52b788; }
.desktop-sidebar .nav-badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 20px; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 8px; }
.sidebar-footer button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
#authBtn { background: #52b788; }

/* ===== MAIN CONTENT ===== */
.main-content {
  margin-left: 260px;
  padding: 20px;
  min-height: 100vh;
}
.page { display: none; }
.page.active { display: block; }

/* ===== CARDS & UI ===== */
.card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  margin-bottom: 16px;
  overflow: hidden;
}
.card-header { padding: 16px; border-bottom: 1px solid #e9ecef; display: flex; align-items: center; gap: 10px; }
.card-body { padding: 16px; }
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.summary-tile {
  background: white;
  border-radius: 16px;
  padding: 16px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.tile-amount { font-size: 1.6rem; font-weight: 700; font-family: monospace; }
.income .tile-amount { color: #2d6a4f; }
.expense .tile-amount { color: #e63946; }

.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.cat-tile {
  background: white;
  border-radius: 16px;
  padding: 16px;
  cursor: pointer;
  transition: transform 0.1s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.cat-tile:active { transform: scale(0.98); }
.ct-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.ct-icon { font-size: 1.6rem; }
.ct-name { font-weight: 600; flex: 1; }
.ct-spent { font-weight: 700; }
.ct-bar-wrap { height: 8px; background: #e9ecef; border-radius: 4px; overflow: hidden; margin: 8px 0; }
.ct-bar { height: 100%; background: #52b788; transition: width 0.2s; }
.ct-bar.warn { background: #f4a261; }
.ct-bar.danger { background: #e63946; }

.form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.form-group { flex: 1; min-width: 120px; display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 0.7rem; color: #6c757d; font-weight: 600; }
input, select, button {
  font-family: inherit;
  font-size: 0.9rem;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #dee2e6;
  background: white;
}
input:focus, select:focus { outline: none; border-color: #52b788; }
.btn {
  background: #2d6a4f;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.1s;
}
.btn:active { opacity: 0.7; }
.btn-secondary { background: #6c757d; }
.btn-danger { background: #e63946; }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }

.tx-list { list-style: none; }
.tx-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid #f1f3f5;
}
.tx-info { flex: 1; }
.tx-label { font-weight: 500; }
.tx-meta { font-size: 0.7rem; color: #6c757d; }
.tx-amount { font-family: monospace; font-weight: 700; }
.credit { color: #2d6a4f; }
.debit { color: #e63946; }
.badge { font-size: 0.6rem; background: #e9ecef; padding: 2px 6px; border-radius: 12px; }

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 24px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header, .modal-footer { padding: 16px 20px; border-bottom: 1px solid #e9ecef; }
.modal-footer { border-bottom: none; border-top: 1px solid #e9ecef; display: flex; gap: 8px; justify-content: flex-end; }
.modal-body { padding: 20px; }

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1e293b;
  color: white;
  padding: 12px 20px;
  border-radius: 40px;
  font-size: 0.85rem;
  z-index: 1200;
  transition: transform 0.2s;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 768px) {
  .desktop-sidebar { display: none; }
  .mobile-header { display: flex; }
  .main-content { margin-left: 0; padding-top: 70px; }
  .summary-grid { grid-template-columns: 1fr 1fr; }
  .cat-grid { grid-template-columns: 1fr; }
  .form-row { flex-direction: column; align-items: stretch; }
  .form-group { min-width: auto; }
  .btn { padding: 12px; }
}
</style>
</head>
<body>

<!-- Mobile Header -->
<div class="mobile-header">
  <button class="hamburger" id="hamburgerBtn">☰</button>
  <h1>💰 Budget</h1>
  <div style="width: 40px;"></div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar-mobile" id="sidebarMobile">
  <button class="close-btn" id="closeSidebarBtn">✕</button>
  <div class="sidebar-brand"><h2>Budget Familial</h2></div>
  <div class="month-nav" style="padding: 16px;">
    <select id="monthSelectMobile"></select>
    <select id="yearSelectMobile"></select>
  </div>
  <div id="mobileNavItems"></div>
  <div class="sidebar-footer">
    <button id="authBtnMobile">🔑 Connexion</button>
    <button onclick="exportData()">💾 Export</button>
    <button onclick="importDataClick()">📂 Import</button>
  </div>
</div>

<!-- Desktop Sidebar -->
<div class="desktop-sidebar">
  <div class="sidebar-brand"><h2>💰 Budget Familial</h2><p style="font-size:0.7rem;">Avec reports + Cloud</p></div>
  <div class="month-nav">
    <select id="monthSelectDesktop"></select>
    <select id="yearSelectDesktop"></select>
  </div>
  <div id="desktopNavItems"></div>
  <div class="sidebar-footer">
    <button id="authBtnDesktop">🔑 Connexion</button>
    <button onclick="exportData()">💾 Export</button>
    <button onclick="importDataClick()">📂 Import</button>
    <button onclick="if(confirm('Reset mois ?')) resetMonth()">🔄 Reset</button>
  </div>
</div>

<div class="main-content">
  <!-- Dashboard -->
  <div id="page-dashboard" class="page active">
    <div class="topbar" style="display:flex;justify-content:space-between;margin-bottom:16px;">
      <h2>Tableau de bord</h2>
      <button class="btn btn-sm" onclick="openProgModal()">+ Programmer</button>
    </div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- Recettes -->
  <div id="page-recettes" class="page">
    <div class="topbar" style="display:flex;justify-content:space-between;margin-bottom:16px;">
      <h2>💰 Recettes</h2>
      <button class="btn btn-sm" onclick="openProgModal('recette')">+ Programmer</button>
    </div>
    <div class="card">
      <div class="card-header"><h3>Ajouter</h3></div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group"><label>Libellé</label><input type="text" id="rec-libelle"></div>
          <div class="form-group"><label>Montant (€)</label><input type="number" id="rec-montant" step="0.01"></div>
          <div class="form-group"><label>Date</label><input type="date" id="rec-date"></div>
          <div class="form-group"><button class="btn" onclick="addRecette()">Ajouter</button></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Liste</h3><span id="totalRecettes" class="font-mono" style="font-family:monospace;">0€</span></div>
      <div class="card-body"><ul class="tx-list" id="listRecettes"></ul></div>
    </div>
  </div>

  <!-- Catégorie dynamique -->
  <div id="page-categorie" class="page">
    <div class="topbar" style="display:flex;justify-content:space-between;margin-bottom:16px;">
      <h2 id="catPageTitle">Catégorie</h2>
      <div><button class="btn btn-sm" onclick="openProgModal('depense', currentCat)">+ Prog</button></div>
    </div>
    <div id="catBudgetContainer"></div>
    <div id="medicalSummaryBlock" style="display:none;"></div>
    <div class="card" id="addFormCard">
      <div class="card-header"><h3>Ajouter</h3></div>
      <div class="card-body" id="addFormBody"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Transactions</h3><span id="catTotalLabel" class="font-mono">0€</span></div>
      <div class="card-body"><ul class="tx-list" id="catTxList"></ul></div>
    </div>
  </div>

  <!-- Programmation -->
  <div id="page-programmation" class="page">
    <div class="topbar"><h2>🗓️ Programmations</h2><button class="btn btn-sm" onclick="openProgModal()">+ Nouvelle</button></div>
    <div class="card"><div class="card-body" id="progListContainer"></div></div>
  </div>

  <!-- Bilan -->
  <div id="page-bilan" class="page">
    <div class="topbar"><h2>📋 Bilan</h2><button class="btn btn-sm btn-secondary" onclick="printBilan()">🖨️ Imprimer</button></div>
    <div id="bilanContent"></div>
  </div>

  <!-- Catégories -->
  <div id="page-categories" class="page">
    <div class="topbar"><h2>⚙️ Catégories</h2></div>
    <div class="card">
      <div class="card-header"><h3>Ajouter</h3></div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group"><input type="text" id="newCatName" placeholder="Nom"></div>
          <div class="form-group"><input type="text" id="newCatIcon" placeholder="Icône" style="width:70px;"></div>
          <div class="form-group"><button class="btn" onclick="addCategory()">Créer</button></div>
        </div>
      </div>
    </div>
    <div class="card"><div class="card-header"><h3>Liste</h3></div><div class="card-body" id="catManagerList"></div></div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="progModalOverlay" onclick="if(event.target===this) closeProgModal()"><div class="modal"><div class="modal-header"><h3>📅 Programmer</h3><button class="btn btn-sm" onclick="closeProgModal()">✕</button></div><div class="modal-body"><div class="form-row"><div class="form-group"><label>Type</label><select id="prog-type" onchange="onProgTypeChange()"><option value="depense">Dépense</option><option value="recette">Recette</option></select></div><div class="form-group" id="progCatGroup"><label>Catégorie</label><select id="prog-cat"></select></div></div><div class="form-group"><label>Libellé</label><input id="prog-libelle"></div><div class="form-row"><div class="form-group"><label>Montant</label><input type="number" id="prog-montant" step="0.01"></div><div class="form-group"><label>Récurrence</label><select id="prog-recurrence"><option value="unique">Unique</option><option value="mensuel">Mensuel</option><option value="trimestriel">Trimestriel</option><option value="annuel">Annuel</option></select></div></div><div class="form-row"><div class="form-group"><label>Début</label><input type="date" id="prog-debut"></div><div class="form-group"><label>Fin</label><input type="date" id="prog-fin"></div></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeProgModal()">Annuler</button><button class="btn" onclick="saveProg()">Enregistrer</button></div></div></div>

<div class="modal-overlay" id="editModalOverlay" onclick="if(event.target===this) closeEditModal()"><div class="modal"><div class="modal-header"><h3>✏️ Modifier</h3><button class="btn btn-sm" onclick="closeEditModal()">✕</button></div><div class="modal-body" id="editModalBody"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeEditModal()">Annuler</button><button class="btn" onclick="saveEdit()">Enregistrer</button></div></div></div>

<input type="file" id="importFileInput" accept=".json" style="display:none">
<div id="toast"></div>

<script>
// ========== CONFIGURATION FIREBASE (À REMPLACER PAR VOS IDENTIFIANTS) ==========
const firebaseConfig = {
  apiKey: "AIzaSyB7xBajLC9cMDMNDyWnM-495uivwKsg3po",
  authDomain: "budget-familial-99207.firebaseapp.com",
  databaseURL: "https://budget-familial-99207-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "budget-familial-99207",
  storageBucket: "budget-familial-99207.firebasestorage.app",
  messagingSenderId: "697097113241",
  appId: "1:697097113241:web:24575cfaf92119bb7df208"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// ========== ÉTAT GLOBAL ==========
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
let defaultCategories = [
  { id:'alimentation', name:'Alimentation', icon:'🛒' }, { id:'voiture', name:'Voiture', icon:'🚗' },
  { id:'medical', name:'Médical', icon:'🏥' }, { id:'loisirs', name:'Loisirs', icon:'🎭' },
  { id:'maison', name:'Maison', icon:'🏠' }, { id:'epargne', name:'Épargne', icon:'💎' }
];
let state = { categories: [], programmations: [], repartitionConfig: {}, months: {}, suggestions: {} };
let currentMonth = new Date().getMonth(), currentYear = new Date().getFullYear(), currentCat = null, currentPage = 'dashboard';
let saveTimeout = null;

// ========== UTILITAIRES ==========
function getMonthKey() { return `${currentYear}-${currentMonth}`; }
function getPrevMonthKey() { let y=currentYear, m=currentMonth-1; if(m<0){ m=11; y--; } return `${y}-${m}`; }
function uid() { return Date.now()+'-'+Math.random().toString(36).substr(2,6); }
function fmtEur(n) { return (Math.round(n*100)/100).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function showToast(msg, type='') { let el=document.getElementById('toast'); el.textContent=msg; el.className='show '+type; setTimeout(()=>el.className='',2500); }

function getMonthData() {
  let key = getMonthKey();
  if (!state.months[key]) state.months[key] = { recettes: [], depenses: {}, budgets: {} };
  state.categories.forEach(c => { if (!state.months[key].depenses[c.id]) state.months[key].depenses[c.id] = []; });
  return state.months[key];
}

function getCarryOver(catId) {
  let prevKey = getPrevMonthKey();
  let prevData = state.months[prevKey];
  if (!prevData) return 0;
  let prevBudget = (prevData.budgets || {})[catId] || 0;
  let prevDepenses = prevData.depenses[catId] || [];
  let prevSpent = (catId === 'medical') ? prevDepenses.reduce((s,t)=>t.txType==='remboursement'?s-t.montant:s+t.montant,0) : prevDepenses.reduce((s,t)=>s+t.montant,0);
  return prevBudget - prevSpent;
}

function getTotalDepensesCat(catId) {
  let txs = getMonthData().depenses[catId] || [];
  if (catId === 'medical') return txs.reduce((s,t)=>t.txType==='remboursement'?s-t.montant:s+t.montant,0);
  return txs.reduce((s,t)=>s+t.montant,0);
}
function getTotalRecettes() { return getMonthData().recettes.reduce((s,r)=>s+r.montant,0); }
function getTotalAllDepenses() { return state.categories.reduce((s,c)=>s+getTotalDepensesCat(c.id),0); }

// ========== SAUVEGARDE ==========
async function saveState() {
  localStorage.setItem('budgetFamilial_v5', JSON.stringify(state));
  if (auth.currentUser) {
    try { await db.collection('budgets').doc(auth.currentUser.uid).set({ data: state }); } catch(e) {}
  }
}
function loadState() {
  try { let raw = localStorage.getItem('budgetFamilial_v5'); if(raw) state = { ...state, ...JSON.parse(raw) }; } catch(e) {}
  if (!state.categories.length) state.categories = JSON.parse(JSON.stringify(defaultCategories));
  if (!state.months) state.months = {};
  if (!state.programmations) state.programmations = [];
  if (!state.suggestions) state.suggestions = {};
}
async function loadFromCloud(userId) {
  let doc = await db.collection('budgets').doc(userId).get();
  if (doc.exists) { state = { ...state, ...doc.data().data }; showToast('☁️ Données cloud chargées', 'success'); }
  buildSidebar();
  navigateTo(currentPage);
}

// ========== AUTHENTIFICATION ==========
async function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    const result = await auth.signInWithPopup(provider);
    showToast(`👋 Bonjour ${result.user.displayName}`, 'success');
    updateAuthButtons(result.user.displayName);
    await loadFromCloud(result.user.uid);
  } catch(e) { showToast('Erreur connexion: '+e.message, 'error'); }
}
async function signOut() {
  await auth.signOut();
  showToast('Déconnecté', 'info');
  updateAuthButtons(null);
  loadState();
  buildSidebar();
  navigateTo('dashboard');
}
function updateAuthButtons(userName) {
  const btns = document.querySelectorAll('#authBtnDesktop, #authBtnMobile');
  btns.forEach(btn => {
    if (userName) { btn.innerHTML = `👤 ${userName}`; btn.onclick = signOut; }
    else { btn.innerHTML = '🔑 Connexion'; btn.onclick = signIn; }
  });
}
auth.onAuthStateChanged(async user => {
  if (user) { updateAuthButtons(user.displayName); await loadFromCloud(user.uid); }
  else { updateAuthButtons(null); loadState(); buildSidebar(); navigateTo('dashboard'); }
});

// ========== INTERFACE (commun desktop/mobile) ==========
function buildSidebar() {
  const desktopContainer = document.getElementById('desktopNavItems');
  const mobileContainer = document.getElementById('mobileNavItems');
  if (!desktopContainer) return;
  const navHtml = (cat, isMobile) => `
    <div class="nav-item" data-cat="${cat.id}" data-page="categorie">
      <span class="nav-icon">${cat.icon}</span>
      <span class="nav-label">${cat.name}</span>
      <span class="nav-badge" id="badge-${cat.id}">0€</span>
    </div>`;
  
  let desktopHtml = '', mobileHtml = '';
  state.categories.forEach(c => { desktopHtml += navHtml(c, false); mobileHtml += navHtml(c, true); });
  desktopContainer.innerHTML = desktopHtml;
  mobileContainer.innerHTML = mobileHtml;
  
  // Événements
  document.querySelectorAll('.nav-item[data-page="categorie"]').forEach(el => {
    el.onclick = () => { navigateTo('categorie', el.dataset.cat); closeMobileSidebar(); };
  });
  document.querySelectorAll('.nav-item[data-page="dashboard"]').forEach(el => { el.onclick = () => { navigateTo('dashboard'); closeMobileSidebar(); }; });
  document.querySelectorAll('.nav-item[data-page="recettes"]').forEach(el => { el.onclick = () => { navigateTo('recettes'); closeMobileSidebar(); }; });
  document.querySelectorAll('.nav-item[data-page="programmation"]').forEach(el => { el.onclick = () => { navigateTo('programmation'); closeMobileSidebar(); }; });
  document.querySelectorAll('.nav-item[data-page="bilan"]').forEach(el => { el.onclick = () => { navigateTo('bilan'); closeMobileSidebar(); }; });
  document.querySelectorAll('.nav-item[data-page="categories"]').forEach(el => { el.onclick = () => { navigateTo('categories'); closeMobileSidebar(); }; });
  updateBadges();
}
function updateBadges() {
  state.categories.forEach(c => {
    let spent = getTotalDepensesCat(c.id);
    let badge = document.getElementById(`badge-${c.id}`);
    if (badge) badge.textContent = fmtEur(spent);
  });
  let recBadge = document.getElementById('badge-recettes');
  if (recBadge) recBadge.textContent = fmtEur(getTotalRecettes());
}

function navigateTo(page, catId=null) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (catId) {
    currentCat = catId;
    document.getElementById('page-categorie').classList.add('active');
    renderCatPage(catId);
  } else {
    document.getElementById(`page-${page}`).classList.add('active');
    if (page === 'dashboard') renderDashboard();
    if (page === 'recettes') renderRecettes();
    if (page === 'programmation') renderProgrammation();
    if (page === 'bilan') renderBilan();
    if (page === 'categories') renderCatManager();
  }
  updateBadges();
}

// ========== RENDU DES PAGES ==========
function renderDashboard() {
  let totalRec = getTotalRecettes();
  let totalDep = getTotalAllDepenses();
  let solde = totalRec - totalDep;
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-tile income"><div class="tile-amount">${fmtEur(totalRec)}</div><div>Recettes</div></div>
    <div class="summary-tile expense"><div class="tile-amount">${fmtEur(totalDep)}</div><div>Dépenses</div></div>
    <div class="summary-tile"><div class="tile-amount" style="color:${solde>=0?'#2d6a4f':'#e63946'}">${fmtEur(solde)}</div><div>Solde</div></div>
  `;
  let grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  state.categories.forEach(c => {
    let spent = getTotalDepensesCat(c.id);
    let budget = (getMonthData().budgets || {})[c.id] || 0;
    let carry = getCarryOver(c.id);
    let eff = budget + carry;
    let pct = eff > 0 ? Math.min((spent/eff)*100, 100) : 0;
    grid.innerHTML += `<div class="cat-tile" onclick="navigateTo('categorie','${c.id}')"><div class="ct-top"><span class="ct-icon">${c.icon}</span><span class="ct-name">${c.name}</span><span class="ct-spent">${fmtEur(spent)}</span></div><div class="ct-bar-wrap"><div class="ct-bar ${pct>=100?'danger':pct>=80?'warn':''}" style="width:${pct}%"></div></div><div>Budget effectif: ${fmtEur(eff)}</div>${carry!==0?`<div style="font-size:0.7rem;">📦 Report: ${carry>0?'+':''}${fmtEur(carry)}</div>`:''}</div>`;
  });
}

function renderRecettes() {
  let recettes = getMonthData().recettes;
  let total = recettes.reduce((s,r)=>s+r.montant,0);
  document.getElementById('totalRecettes').innerHTML = fmtEur(total);
  let list = document.getElementById('listRecettes');
  if (!recettes.length) list.innerHTML = '<li class="tx-item">Aucune recette</li>';
  else list.innerHTML = recettes.map(r => `<li class="tx-item"><div class="tx-info"><div class="tx-label">${r.libelle}</div><div class="tx-meta">${r.date}</div></div><div class="tx-amount credit">${fmtEur(r.montant)}</div><div><button class="btn btn-danger btn-sm" onclick="removeRecette('${r.id}')">🗑️</button></div></li>`).join('');
}
function addRecette() {
  let lib = document.getElementById('rec-libelle').value.trim();
  let mont = parseFloat(document.getElementById('rec-montant').value);
  let date = document.getElementById('rec-date').value;
  if (!lib || !mont || !date) return showToast('Champs requis','error');
  let md = getMonthData();
  md.recettes.push({ id:uid(), libelle:lib, montant:mont, date });
  saveState();
  renderRecettes();
  updateBadges();
  showToast('Recette ajoutée','success');
}
function removeRecette(id) { let md = getMonthData(); md.recettes = md.recettes.filter(r=>r.id!==id); saveState(); renderRecettes(); updateBadges(); }

function renderCatPage(catId) {
  let cat = state.categories.find(c=>c.id===catId);
  if (!cat) return;
  document.getElementById('catPageTitle').innerHTML = `${cat.icon} ${cat.name}`;
  let md = getMonthData();
  let budget = (md.budgets || {})[catId] || 0;
  let carry = getCarryOver(catId);
  let spent = getTotalDepensesCat(catId);
  let eff = budget + carry;
  document.getElementById('catBudgetContainer').innerHTML = `<div class="card"><div class="card-body"><div>Budget mensuel: <input type="number" id="catBudgetInput" value="${budget}" onchange="updateCatBudget('${catId}')" style="width:100px;"> €</div>${carry!==0?`<div>Report: ${carry>0?'+':''}${fmtEur(carry)}</div>`:''}<div><strong>Budget effectif: ${fmtEur(eff)}</strong></div><div>Dépensé: ${fmtEur(spent)} | Reste: ${fmtEur(eff-spent)}</div><div class="budget-bar-wrap"><div class="budget-bar" style="width:${Math.min((spent/eff)*100,100)}%"></div></div></div></div>`;
  let isMedical = catId === 'medical';
  let medBlock = document.getElementById('medicalSummaryBlock');
  medBlock.style.display = isMedical ? 'block' : 'none';
  if (isMedical) {
    let txs = md.depenses[catId] || [];
    let dep = txs.filter(t=>t.txType!=='remboursement').reduce((s,t)=>s+t.montant,0);
    let remb = txs.filter(t=>t.txType==='remboursement').reduce((s,t)=>s+t.montant,0);
    medBlock.innerHTML = `<div class="card"><div class="card-body"><div>Dépenses: ${fmtEur(dep)} | Remboursements: ${fmtEur(remb)} | Net: ${fmtEur(dep-remb)}</div></div></div>`;
  }
  document.getElementById('addFormBody').innerHTML = `<div class="form-row"><div class="form-group"><input type="text" id="dep-libelle-${catId}" placeholder="Libellé"></div><div class="form-group"><input type="number" id="dep-montant-${catId}" placeholder="Montant" step="0.01"></div><div class="form-group"><input type="date" id="dep-date-${catId}"></div>${isMedical?`<div class="form-group"><select id="dep-type-${catId}"><option value="depense">Dépense</option><option value="remboursement">Remboursement</option></select></div>`:''}<div class="form-group"><button class="btn" onclick="addDepense('${catId}')">Ajouter</button></div></div>`;
  let dateInp = document.getElementById(`dep-date-${catId}`);
  if (dateInp && !dateInp.value) dateInp.value = new Date().toISOString().split('T')[0];
  renderCatTransactions(catId);
}
function updateCatBudget(catId) {
  let val = parseFloat(document.getElementById('catBudgetInput').value) || 0;
  let md = getMonthData();
  if (!md.budgets) md.budgets = {};
  md.budgets[catId] = val;
  saveState();
  renderCatPage(catId);
  updateBadges();
}
function addDepense(catId) {
  let lib = document.getElementById(`dep-libelle-${catId}`).value.trim();
  let mont = parseFloat(document.getElementById(`dep-montant-${catId}`).value);
  let date = document.getElementById(`dep-date-${catId}`).value;
  let txType = (catId==='medical' ? document.getElementById(`dep-type-${catId}`).value : 'depense');
  if (!lib || !mont || !date) return showToast('Champs requis','error');
  let md = getMonthData();
  if (!md.depenses[catId]) md.depenses[catId] = [];
  md.depenses[catId].push({ id:uid(), libelle:lib, montant:mont, date, txType });
  saveState();
  renderCatTransactions(catId);
  updateBadges();
  showToast('Ajouté','success');
}
function removeDepense(catId, id) { let md = getMonthData(); md.depenses[catId] = md.depenses[catId].filter(d=>d.id!==id); saveState(); renderCatTransactions(catId); updateBadges(); }
function renderCatTransactions(catId) {
  let txs = getMonthData().depenses[catId] || [];
  let total = txs.reduce((s,t)=>s+t.montant,0);
  document.getElementById('catTotalLabel').innerHTML = fmtEur(total);
  let list = document.getElementById('catTxList');
  if (!txs.length) list.innerHTML = '<li class="tx-item">Aucune transaction</li>';
  else list.innerHTML = txs.map(t => `<li class="tx-item"><div class="tx-info"><div class="tx-label">${t.libelle}${t.txType==='remboursement'?' <span class="badge">Remb.</span>':''}</div><div class="tx-meta">${t.date}</div></div><div class="tx-amount ${t.txType==='remboursement'?'credit':'debit'}">${t.txType==='remboursement'?'+':'-'}${fmtEur(t.montant)}</div><div><button class="btn btn-danger btn-sm" onclick="removeDepense('${catId}','${t.id}')">🗑️</button></div></li>`).join('');
}
function renderProgrammation() { let cont=document.getElementById('progListContainer'); if(!state.programmations.length) cont.innerHTML='<p>Aucune programmation</p>'; else cont.innerHTML=state.programmations.map(p=>`<div class="card"><div class="card-body"><strong>${p.libelle}</strong> - ${p.montant}€ - ${p.recurrence}<br><button class="btn btn-sm" onclick="suspendProg('${p.id}')">⏸</button> <button class="btn btn-danger btn-sm" onclick="deleteProg('${p.id}')">🗑️</button></div></div>`).join(''); }
function suspendProg(pid) { let p=state.programmations.find(x=>x.id===pid); if(p) p.suspended=!p.suspended; saveState(); renderProgrammation(); }
function deleteProg(pid) { if(confirm('Supprimer ?')){ state.programmations=state.programmations.filter(p=>p.id!==pid); saveState(); renderProgrammation(); } }
function openProgModal(type='depense', catId=null) { /* simplification pour la démo */ alert('Fonction programmation détaillée dans la version précédente'); }
function closeProgModal() { document.getElementById('progModalOverlay').classList.remove('open'); }
function onProgTypeChange() {}
function saveProg() { closeProgModal(); showToast('Programmé (simplifié)'); }
function renderBilan() {
  let totalRec=getTotalRecettes(), totalDep=getTotalAllDepenses(), solde=totalRec-totalDep;
  let md=getMonthData();
  let html=`<div class="card"><div class="card-header"><h3>Résumé</h3></div><div class="card-body"><div>Recettes: ${fmtEur(totalRec)}</div><div>Dépenses: ${fmtEur(totalDep)}</div><div><strong>Solde: ${fmtEur(solde)}</strong></div></div></div><div class="card"><div class="card-header"><h3>Détail par catégorie</h3></div><div class="card-body">${state.categories.map(c=>{ let b=(md.budgets||{})[c.id]||0; let carry=getCarryOver(c.id); let eff=b+carry; let spent=getTotalDepensesCat(c.id); return `<div><strong>${c.icon} ${c.name}</strong> : Budget ${fmtEur(eff)} (dont report ${fmtEur(carry)}), dépensé ${fmtEur(spent)}, reste ${fmtEur(eff-spent)}</div>`; }).join('')}</div></div>`;
  document.getElementById('bilanContent').innerHTML=html;
}
function printBilan() { window.print(); }
function renderCatManager() { let list=document.getElementById('catManagerList'); list.innerHTML=state.categories.map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid #eee;"><span>${c.icon}</span><span style="flex:1">${c.name}</span><input type="text" value="${c.icon}" onchange="updateCatIcon('${c.id}',this.value)" style="width:50px;"><input type="text" value="${c.name}" onchange="updateCatName('${c.id}',this.value)"><button class="btn btn-danger btn-sm" onclick="deleteCategory('${c.id}')">🗑️</button></div>`).join(''); }
function addCategory() { let name=document.getElementById('newCatName').value.trim(); if(!name) return; let icon=document.getElementById('newCatIcon').value.trim()||'📦'; let id=name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now(); state.categories.push({id,name,icon}); saveState(); buildSidebar(); renderCatManager(); showToast('Catégorie ajoutée','success'); }
function updateCatName(id,name){ let c=state.categories.find(c=>c.id===id); if(c){ c.name=name; saveState(); buildSidebar(); } }
function updateCatIcon(id,icon){ let c=state.categories.find(c=>c.id===id); if(c){ c.icon=icon; saveState(); buildSidebar(); renderCatManager(); } }
function deleteCategory(id){ if(confirm('Supprimer ?')){ state.categories=state.categories.filter(c=>c.id!==id); Object.values(state.months).forEach(m=>{ delete m.depenses[id]; delete m.budgets[id]; }); state.programmations=state.programmations.filter(p=>p.catId!==id); saveState(); buildSidebar(); renderCatManager(); } }
function exportData() { let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(state)],{type:'application/json'})); a.download=`budget_${currentYear}_${currentMonth+1}.json`; a.click(); }
function importDataClick() { document.getElementById('importFileInput').click(); }
function importData(e) { let file=e.target.files[0]; if(!file) return; let reader=new FileReader(); reader.onload=ev=>{ let data=JSON.parse(ev.target.result); if(confirm('Remplacer ?')){ state=data; saveState(); location.reload(); } }; reader.readAsText(file); }
function resetMonth() { let md=getMonthData(); md.recettes=[]; state.categories.forEach(c=>{ md.depenses[c.id]=[]; }); saveState(); if(currentCat) renderCatPage(currentCat); else navigateTo('dashboard'); showToast('Mois réinitialisé','warning'); }
function openEditModal(section,catId,txId) { alert('Édition simplifiée'); }
function closeEditModal() {}
function saveEdit() {}

// ========== MOBILE SIDEBAR ==========
function openMobileSidebar() {
  document.getElementById('sidebarMobile').classList.add('open');
  document.getElementById('sidebarOverlay').style.display = 'block';
}
function closeMobileSidebar() {
  document.getElementById('sidebarMobile').classList.remove('open');
  document.getElementById('sidebarOverlay').style.display = 'none';
}
document.getElementById('hamburgerBtn')?.addEventListener('click', openMobileSidebar);
document.getElementById('closeSidebarBtn')?.addEventListener('click', closeMobileSidebar);
document.getElementById('sidebarOverlay')?.addEventListener('click', closeMobileSidebar);

// ========== INITIALISATION ==========
function init() {
  loadState();
  // Remplir les sélecteurs desktop et mobile
  const monthSelectors = ['monthSelectDesktop', 'monthSelectMobile'];
  const yearSelectors = ['yearSelectDesktop', 'yearSelectMobile'];
  monthSelectors.forEach(selId => {
    let sel = document.getElementById(selId);
    if (sel) MONTHS.forEach((m,i) => { let opt=document.createElement('option'); opt.value=i; opt.textContent=m; if(i===currentMonth) opt.selected=true; sel.appendChild(opt); });
  });
  let currentYearVal = currentYear;
  yearSelectors.forEach(selId => {
    let sel = document.getElementById(selId);
    if (sel) for(let y=currentYearVal-2; y<=currentYearVal+2; y++) { let opt=document.createElement('option'); opt.value=y; opt.textContent=y; if(y===currentYearVal) opt.selected=true; sel.appendChild(opt); }
  });
  const updateMonthYear = () => {
    currentMonth = parseInt(document.getElementById('monthSelectDesktop').value);
    currentYear = parseInt(document.getElementById('yearSelectDesktop').value);
    document.getElementById('monthSelectMobile').value = currentMonth;
    document.getElementById('yearSelectMobile').value = currentYear;
    if(currentCat) renderCatPage(currentCat); else navigateTo(currentPage);
  };
  document.getElementById('monthSelectDesktop')?.addEventListener('change', updateMonthYear);
  document.getElementById('yearSelectDesktop')?.addEventListener('change', updateMonthYear);
  document.getElementById('monthSelectMobile')?.addEventListener('change', () => { currentMonth = parseInt(document.getElementById('monthSelectMobile').value); currentYear = parseInt(document.getElementById('yearSelectMobile').value); document.getElementById('monthSelectDesktop').value = currentMonth; document.getElementById('yearSelectDesktop').value = currentYear; if(currentCat) renderCatPage(currentCat); else navigateTo(currentPage); closeMobileSidebar(); });
  document.getElementById('yearSelectMobile')?.addEventListener('change', () => { currentMonth = parseInt(document.getElementById('monthSelectMobile').value); currentYear = parseInt(document.getElementById('yearSelectMobile').value); document.getElementById('monthSelectDesktop').value = currentMonth; document.getElementById('yearSelectDesktop').value = currentYear; if(currentCat) renderCatPage(currentCat); else navigateTo(currentPage); closeMobileSidebar(); });
  buildSidebar();
  navigateTo('dashboard');
  document.getElementById('importFileInput').onchange = importData;
  window.addRecette = addRecette; window.removeRecette = removeRecette;
  window.addDepense = addDepense; window.removeDepense = removeDepense;
  window.updateCatBudget = updateCatBudget;
  window.openProgModal = openProgModal; window.closeProgModal = closeProgModal; window.saveProg = saveProg; window.onProgTypeChange = onProgTypeChange;
  window.suspendProg = suspendProg; window.deleteProg = deleteProg;
  window.addCategory = addCategory; window.updateCatName = updateCatName; window.updateCatIcon = updateCatIcon; window.deleteCategory = deleteCategory;
  window.exportData = exportData; window.importDataClick = importDataClick; window.resetMonth = resetMonth; window.printBilan = printBilan;
  window.openEditModal = openEditModal; window.closeEditModal = closeEditModal; window.saveEdit = saveEdit;
  window.navigateTo = navigateTo;
}
init();
</script>
</body>
</html>
